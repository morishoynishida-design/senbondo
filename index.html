<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>senbondo configurator</title>
  <style>
    :root{
      --bg:#ffffff;
      --panel:#f3f4f6;
      --panel2:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --btn:#e5e7eb;
      --btnText:#111827;
      --btnActive:#2563eb;
      --btnActiveText:#ffffff;
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --radius: 18px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    /* --- Layout --- */
    .app{
      display:flex;
      gap:16px;
      padding:16px;
      min-height:100vh;
    }

    .sidebar{
      width:min(420px, 44vw);
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:14px;
      overflow:auto;
      max-height:calc(100vh - 32px);
      box-shadow:var(--shadow);
    }

    .main{
      flex:1;
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .stageWrap{
      flex:1;
      background:var(--panel2);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden; /* 重要：はみ出しを見せない */
    }

    /* --- Stage (image stacking) --- */
    .stage{
      position:relative;
      width:min(820px, 92vw);
      /* スマホ/iPadで小さくなりすぎないよう高さも確保 */
      height:auto;
    }

    /* ベース含め全レイヤーは同じサイズの透過PNG前提 */
    .layer{
      width:100%;
      height:auto;
      display:block;
      user-select:none;
      -webkit-user-drag:none;
    }
    .layer.part{
      position:absolute;
      left:0;
      top:0;
      pointer-events:none;
    }

    /* --- Sidebar UI --- */
    .title{
      font-weight:700;
      margin:4px 0 10px;
      font-size:14px;
      color:var(--muted);
      letter-spacing:.02em;
    }

    .group{
      background:#fff;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      margin-bottom:12px;
    }

    .groupHeader{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:8px;
      margin-bottom:10px;
    }
    .groupHeader h3{
      margin:0;
      font-size:14px;
      letter-spacing:.01em;
    }
    .groupHeader .count{
      font-size:12px;
      color:var(--muted);
    }

    .btnGrid{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    button.opt{
      appearance:none;
      border:1px solid var(--border);
      background:var(--btn);
      color:var(--btnText);
      padding:10px 12px;
      border-radius:12px;
      font-size:13px;
      line-height:1;
      cursor:pointer;
      transition: transform .02s ease, background .12s ease, color .12s ease, border-color .12s ease;
      min-width:84px;
      /* タップしやすく */
      min-height:40px;
    }
    button.opt:active{transform:scale(.99)}
    button.opt[aria-pressed="true"]{
      background:var(--btnActive);
      color:var(--btnActiveText);
      border-color:transparent;
    }

    .footerBox{
      background:#fff;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
    }
    .footerBox h4{
      margin:0 0 8px;
      font-size:13px;
      color:var(--muted);
    }
    .selRow{
      display:flex;
      gap:10px;
      justify-content:space-between;
      padding:6px 0;
      border-top:1px dashed var(--border);
      font-size:13px;
    }
    .selRow:first-of-type{border-top:none}
    .selKey{color:var(--muted)}
    .selVal{font-weight:700}

    .resetRow{
      margin-top:10px;
      display:flex;
      gap:8px;
    }
    .resetBtn{
      border:1px solid var(--border);
      background:#fff;
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      min-height:40px;
    }

    /* --- Responsive --- */
    @media (max-width: 980px){
      .app{
        flex-direction:column;
      }
      .sidebar{
        width:100%;
        max-height:none;
      }
      .stage{
        width:min(860px, 96vw);
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="title">千本堂 カスタマイズ</div>

      <div id="controls"></div>

      <div class="footerBox">
        <h4>現在の選択</h4>
        <div class="selRow"><div class="selKey">上台戸板</div><div class="selVal" id="sel-door">通常</div></div>
        <div class="selRow"><div class="selKey">背板</div><div class="selVal" id="sel-center">通常</div></div>
        <div class="selRow"><div class="selKey">柱</div><div class="selVal" id="sel-hashira">ON</div></div>
        <div class="selRow"><div class="selKey">内陣</div><div class="selVal" id="sel-back">通常</div></div>
        <div class="selRow"><div class="selKey">下台戸板</div><div class="selVal" id="sel-unit">通常</div></div>

        <div class="resetRow">
          <button class="resetBtn" id="resetBtn">初期状態に戻す</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <section class="stageWrap">
        <div class="stage" id="stage">
          <!-- ベースは一番下（最初に置く） -->
          <img class="layer" id="layer-base" alt="base" />

          <!-- カスタムパーツ（ベースの上に重なる） -->
          <img class="layer part" id="layer-unit" alt="unit" />
          <img class="layer part" id="layer-back" alt="back" />
          <img class="layer part" id="layer-center" alt="center" />
          <img class="layer part" id="layer-hashira" alt="hashira" />
          <img class="layer part" id="layer-door" alt="door" />
        </div>
      </section>
    </main>
  </div>

  <script>
    /*
      ✅ 重要仕様まとめ
      - すべて透過PNG、キャンバスサイズ同一
      - ベースは最下層
      - 選択名は「ボタン表示名」（label）を表示（ファイル名は出さない）
      - 初期状態：door/center/back/unit は「通常」、柱は「ON」
      - フォルダ構成（例）
        base/base.png
        door/door_normal.png ...
        center/center_normal.png ...
        hashira/hashira_on.png ...
        back/back_normal.png ...
        unit/unit_normal.png ...
    */

    const PARTS = [
      {
        key: "door",
        jp: "上台戸板",
        layerId: "layer-door",
        selId: "sel-door",
        options: [
          { id: "normal",  label: "通常",         file: "door/door_normal.png" },
          { id: "kokutan", label: "黒丹調",       file: "door/door_kokutan.png" },
          { id: "shitan",  label: "紫丹調",       file: "door/door_shitan.png" },
          { id: "oborozakura", label: "おぼろ桜", file: "door/door_oborozakura.png" },
          { id: "uzunomichi",  label: "渦の道",   file: "door/door_uzunomichi.png" },
          { id: "w",       label: "ウォールナット", file: "door/door_w.png" },
          { id: "yaraido", label: "矢来堂",       file: "door/door_yaraido.png" },
        ],
        defaultId: "normal",
      },
      {
        key: "center",
        jp: "背板",
        layerId: "layer-center",
        selId: "sel-center",
        options: [
          { id: "normal",  label: "通常",         file: "center/center_normal.png" },
          { id: "luminous",label: "ルミナス",     file: "center/center_luminous.png" },
          { id: "kokutan", label: "黒丹調",       file: "center/center_kokutan.png" },
          { id: "shitan",  label: "紫丹調",       file: "center/center_shitan.png" },
          { id: "kinshi",  label: "金紙",         file: "center/center_kinshi.png" },
          { id: "w",       label: "ウォールナット", file: "center/center_w.png" },
          { id: "uzunomichi", label: "渦の道",    file: "center/center_uzunomichi.png" },
          { id: "oborozakura", label: "おぼろ桜", file: "center/center_oborozakura.png" },

          { id: "sakuranamiki-kokutan", label: "桜並木（黒丹）", file: "center/center_sakuranamiki-kokutan.png" },
          { id: "sakuranamiki-shitan",  label: "桜並木（紫丹）", file: "center/center_sakuranamiki-shitan.png" },
          { id: "sakuranamiki-w",       label: "桜並木（ウォールナット）", file: "center/center_sakuranamiki-w.png" },

          { id: "towazakura-kokutan", label: "永遠桜（黒丹）", file: "center/center_towazakura-kokutan.png" },
          { id: "towazakura-shitan",      label: "永遠桜（紫丹）", file: "center/center_towazakura-shitan.png" },
          { id: "towazakura-w",      label: "永遠桜（ウォールナット）", file: "center/center_towazakura-w.png" },
        ],
        defaultId: "normal",
      },
      {
        key: "hashira",
        jp: "柱",
        layerId: "layer-hashira",
        selId: "sel-hashira",
        options: [
          { id: "on",  label: "ON",  file: "hashira/hashira_on.png" },
          { id: "off", label: "OFF", file: "hashira/hashira_off.png" },
        ],
        defaultId: "on", // ✅ 柱はONが初期アクティブ
      },
      {
        key: "back",
        jp: "内陣",
        layerId: "layer-back",
        selId: "sel-back",
        options: [
          { id: "normal",  label: "通常",         file: "back/back_normal.png" },
          { id: "luminous",label: "ルミナス",     file: "back/back_luminous.png" },
          { id: "iris",    label: "アイリス",     file: "back/back_iris.png" },
          { id: "kinshi",  label: "金紙",         file: "back/back_kinshi.png" },
          { id: "lily",    label: "リリー",       file: "back/back_lily.png" },
          { id: "w",       label: "ウォールナット", file: "back/back_w.png" },
        ],
        defaultId: "normal",
      },
      {
        key: "unit",
        jp: "下台戸板",
        layerId: "layer-unit",
        selId: "sel-unit",
        options: [
          { id: "normal",  label: "通常",         file: "unit/unit_normal.png" },
          { id: "yaraido", label: "矢来堂",       file: "unit/unit_yaraido.png" },
        ],
        defaultId: "normal",
      },
    ];

    const BASE_FILE = "base/base.png";

    // 現在の状態（選択IDを保持）
    const state = {
      base: BASE_FILE,
      door: null,
      center: null,
      hashira: null,
      back: null,
      unit: null,
    };

    function $(id){ return document.getElementById(id); }

    function setImage(layerId, src){
      const img = $(layerId);
      if(!img) return;

      // 画像が変わらない問題対策：同じsrcでも再読込したいケース用にキャッシュバスター
      const bust = "v=" + Date.now();
      img.src = src.includes("?") ? (src + "&" + bust) : (src + "?" + bust);
    }

    function setSelectedText(selId, label){
      const el = $(selId);
      if(el) el.textContent = label;
    }

    function setActiveButton(partKey, optId){
      const wrap = document.querySelector(`[data-part="${partKey}"]`);
      if(!wrap) return;
      wrap.querySelectorAll("button.opt").forEach(btn=>{
        btn.setAttribute("aria-pressed", btn.dataset.opt === optId ? "true" : "false");
      });
    }

    function apply(partKey, optId){
      const part = PARTS.find(p=>p.key===partKey);
      if(!part) return;

      const opt = part.options.find(o=>o.id===optId);
      if(!opt) return;

      state[partKey] = optId;

      // 画像反映
      setImage(part.layerId, opt.file);

      // 表示名はボタン表示名（label）
      setSelectedText(part.selId, opt.label);

      // ボタンActive
      setActiveButton(partKey, optId);
    }

    function resetAll(){
      // ベース
      setImage("layer-base", BASE_FILE);

      // 各パーツ初期値
      PARTS.forEach(part=>{
        apply(part.key, part.defaultId);
      });
    }

    function renderControls(){
      const root = $("controls");
      root.innerHTML = "";

      PARTS.forEach(part=>{
        const group = document.createElement("div");
        group.className = "group";

        const head = document.createElement("div");
        head.className = "groupHeader";
        head.innerHTML = `<h3>${part.jp}</h3><div class="count">${part.options.length} items</div>`;
        group.appendChild(head);

        const grid = document.createElement("div");
        grid.className = "btnGrid";
        grid.setAttribute("data-part", part.key);

        part.options.forEach(opt=>{
          const btn = document.createElement("button");
          btn.className = "opt";
          btn.type = "button";
          btn.textContent = opt.label;        // ✅ ボタン名は日本語ラベル
          btn.dataset.opt = opt.id;
          btn.setAttribute("aria-pressed", "false");
          btn.addEventListener("click", ()=> apply(part.key, opt.id));
          grid.appendChild(btn);
        });

        group.appendChild(grid);
        root.appendChild(group);
      });
    }

    // 起動
    renderControls();
    $("resetBtn").addEventListener("click", resetAll);

    // 初期状態：全部「通常」＋柱はON
    resetAll();
  </script>
</body>
</html>
